# Post Pilot Workflow Dependency Update And Security Audit

## Action

Follow the dependency-update-and-security-audit workflow:
1. Identify dependencies with security alerts (direct and transitive).
2. Update versions in package.json and/or add overrides (e.g., pnpm.overrides).
3. Update pnpm-lock.yaml to reflect new dependency tree.
4. Verify build and typecheck.
5. Commit changes with a summary of addressed vulnerabilities.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: package.json, pnpm-lock.yaml

